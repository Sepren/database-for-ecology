# Пароль и имя БД для контейнеров берутся из файла .env (env_file),
# а не только из подстановки ${VAR:-default}. Иначе переменная POSTGRES_*,
# случайно заданная в PowerShell/cmd, перекрывает .env и ломает вход (8501).

services:
  db:
    image: postgres:16-alpine
    container_name: woodmind-db
    env_file: .env
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - woodmind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: woodmind-app
    env_file: .env
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      # В .env для локального Streamlit часто 127.0.0.1 — в Docker сеть другая:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./data:/app/data:ro
    # При первом запуске: инициализация БД и ingest — см. README (docker compose run ...)

volumes:
  woodmind_pgdata:
